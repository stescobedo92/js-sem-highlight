name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.slug }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,         target: aarch64-apple-darwin,       slug: darwin-arm64, ext: '' }
          - { os: macos-13,         target: x86_64-apple-darwin,        slug: darwin-x64,   ext: '' }
          - { os: ubuntu-22.04,     target: x86_64-unknown-linux-gnu,   slug: linux-x64,    ext: '' }
          - { os: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu,  slug: linux-arm64,  ext: '' }
          - { os: windows-2022,     target: x86_64-pc-windows-msvc,     slug: win32-x64,    ext: '.exe' }
    env:
      CARGO_TARGET: ${{ matrix.target }}
      ARTIFACT_SLUG: ${{ matrix.slug }}
      BIN_EXT: ${{ matrix.ext }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build release
        shell: bash
        run: cargo build --release --bin js-sem-highlight --target "$CARGO_TARGET"

      - name: Stage tarball (Unix)
        if: matrix.os != 'windows-2022'
        shell: bash
        run: |
          set -euo pipefail
          stage="dist/js-sem-highlight-${ARTIFACT_SLUG}"
          mkdir -p "$stage"
          cp "target/${CARGO_TARGET}/release/js-sem-highlight${BIN_EXT}" "$stage/"
          for f in README.md LICENSE-MIT LICENSE-APACHE; do
            [ -f "$f" ] && cp "$f" "$stage/" || true
          done
          (cd dist && tar -czf "js-sem-highlight-${ARTIFACT_SLUG}.tar.gz" "js-sem-highlight-${ARTIFACT_SLUG}")
          (cd dist && shasum -a 256 "js-sem-highlight-${ARTIFACT_SLUG}.tar.gz" > "js-sem-highlight-${ARTIFACT_SLUG}.tar.gz.sha256")

      - name: Stage zip (Windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        env:
          CARGO_TARGET: ${{ matrix.target }}
          ARTIFACT_SLUG: ${{ matrix.slug }}
          BIN_EXT: ${{ matrix.ext }}
        run: |
          $stage = "dist/js-sem-highlight-$env:ARTIFACT_SLUG"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/$env:CARGO_TARGET/release/js-sem-highlight$env:BIN_EXT" $stage
          $zip = "dist/js-sem-highlight-$env:ARTIFACT_SLUG.zip"
          Compress-Archive -Path $stage -DestinationPath $zip
          $hash = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLower()
          "$hash  js-sem-highlight-$env:ARTIFACT_SLUG.zip" | Out-File -FilePath "$zip.sha256" -Encoding ascii

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: js-sem-highlight-${{ matrix.slug }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release-files
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
          fail_on_unmatched_files: true
